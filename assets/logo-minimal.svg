<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 简约渐变 -->
    <linearGradient id="minimalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 轻微阴影 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- 主要形状 - 简化的C -->
  <path d="M 35 60 
           A 25 25 0 1 1 85 60
           A 18 18 0 1 0 42 60" 
        fill="none" 
        stroke="url(#minimalGradient)" 
        stroke-width="6" 
        stroke-linecap="round"
        filter="url(#softShadow)"/>
  
  <!-- 简约导航点 -->
  <circle cx="60" cy="60" r="4" fill="url(#minimalGradient)" opacity="0.8"/>
  <circle cx="60" cy="60" r="2" fill="#ffffff"/>
  
  <!-- 轨迹线 -->
  <path d="M 30 50 Q 60 42 90 50" 
        fill="none" 
        stroke="url(#minimalGradient)" 
        stroke-width="2" 
        stroke-linecap="round" 
        opacity="0.5"/>
  
  <path d="M 30 70 Q 60 78 90 70" 
        fill="none" 
        stroke="url(#minimalGradient)" 
        stroke-width="2" 
        stroke-linecap="round" 
        opacity="0.5"/>
</svg>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pilotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#pilotGradient)" stroke="#2C5282" stroke-width="3"/>
  
  <!-- Coin Symbol -->
  <circle cx="100" cy="80" r="35" fill="url(#coinGradient)" stroke="#E68900" stroke-width="2"/>
  <text x="100" y="88" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#8B4513">₿</text>
  
  <!-- Pilot Wings -->
  <path d="M60 120 Q80 110 100 120 Q120 110 140 120 L135 130 Q100 125 100 125 Q100 125 65 130 Z" fill="#E2E8F0" stroke="#A0AEC0" stroke-width="1"/>
  
  <!-- Navigation Arrow -->
  <path d="M100 140 L110 155 L100 150 L90 155 Z" fill="#E53E3E" stroke="#C53030" stroke-width="1"/>
  
  <!-- Text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2D3748">CoinPilot</text>
</svg>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 现代渐变 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- 外圆环 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.3"/>
  
  <!-- 主要图形 - 简化的C字母 -->
  <path d="M 60 100 
           A 40 40 0 1 1 140 100
           A 30 30 0 1 0 70 100" 
        fill="none" 
        stroke="url(#primaryGradient)" 
        stroke-width="8" 
        stroke-linecap="round"
        filter="url(#shadow)"/>
  
  <!-- 现代化的飞行轨迹线 -->
  <path d="M 45 85 Q 100 70 155 85" 
        fill="none" 
        stroke="url(#accentGradient)" 
        stroke-width="3" 
        stroke-linecap="round" 
        opacity="0.8"/>
  
  <path d="M 45 115 Q 100 130 155 115" 
        fill="none" 
        stroke="url(#accentGradient)" 
        stroke-width="3" 
        stroke-linecap="round" 
        opacity="0.8"/>
  
  <!-- 简约的导航点 -->
  <circle cx="100" cy="100" r="6" fill="url(#accentGradient)" filter="url(#shadow)"/>
  <circle cx="100" cy="100" r="3" fill="#ffffff" opacity="0.9"/>
  
  <!-- 现代化的装饰元素 -->
  <circle cx="140" cy="80" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="60" cy="120" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="130" cy="130" r="1.5" fill="url(#primaryGradient)" opacity="0.4"/>
</svg>